<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>He / She Snack Spinner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      min-height: 100vh;
    }

    .slots-row {
      display: flex;
      gap: 2rem;
      justify-content: center;
      width: 100%;
      max-width: 700px;
    }

    .slot-card {
      flex: 1;
      background: #fff;
      border: 1px solid #e0e0dc;
      border-radius: 20px;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      justify-content: center;
    }

    .slot-card.spinning {
      animation: shake 0.08s infinite alternate;
    }

    @keyframes shake {
      from { transform: translateY(-3px); }
      to   { transform: translateY(3px); }
    }

    .slot-emoji {
      font-size: 100px;
      line-height: 1;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slot-word {
      font-size: 36px;
      font-weight: 600;
      color: #111;
      min-height: 44px;
      text-align: center;
    }

    .spin-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 600;
      font-family: inherit;
      padding: 1rem 3rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    .spin-btn:active  { transform: scale(0.96); opacity: 0.85; }
    .spin-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div id="app">
    <div class="slots-row">
      <div class="slot-card" id="card-person">
        <div class="slot-emoji" id="slot-person-emoji">👦</div>
        <div class="slot-word"  id="slot-pronoun">he</div>
      </div>
      <div class="slot-card" id="card-snack">
        <div class="slot-emoji" id="slot-snack-emoji">🥜</div>
        <div class="slot-word"  id="slot-snack-name">Peanuts</div>
      </div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spin()">🎲 Spin!</button>
  </div>

  <script>
    const people = [
      { emoji: "👦", word: "he" },
      { emoji: "👧", word: "she" },
    ];
    const snacks = [
      { emoji: "🥜", word: "Peanuts" },
      { emoji: "🥔", word: "Potato Chips" },
      { emoji: "🍘", word: "Crackers" },
      { emoji: "🥨", word: "Pretzels" },
      { emoji: "🧀", word: "Cheese" },
      { emoji: "🍇", word: "Grapes" },
      { emoji: "🍉", word: "Watermelon" },
      { emoji: "🍕", word: "Pizza" },
    ];

    let spinning = false;

    function spin() {
      if (spinning) return;
      spinning = true;
      const btn   = document.getElementById("spin-btn");
      const cardP = document.getElementById("card-person");
      const cardS = document.getElementById("card-snack");
      btn.disabled = true;
      cardP.classList.add("spinning");
      cardS.classList.add("spinning");

      let ticks = 0;
      const totalTicks = 16;
      const interval = setInterval(() => {
        const rp = people[Math.floor(Math.random() * people.length)];
        const rs = snacks[Math.floor(Math.random() * snacks.length)];
        document.getElementById("slot-person-emoji").textContent = rp.emoji;
        document.getElementById("slot-pronoun").textContent      = rp.word;
        document.getElementById("slot-snack-emoji").textContent  = rs.emoji;
        document.getElementById("slot-snack-name").textContent   = rs.word;
        ticks++;
        if (ticks >= totalTicks) {
          clearInterval(interval);
          const fp = people[Math.floor(Math.random() * people.length)];
          const fs = snacks[Math.floor(Math.random() * snacks.length)];
          document.getElementById("slot-person-emoji").textContent = fp.emoji;
          document.getElementById("slot-pronoun").textContent      = fp.word;
          document.getElementById("slot-snack-emoji").textContent  = fs.emoji;
          document.getElementById("slot-snack-name").textContent   = fs.word;
          cardP.classList.remove("spinning");
          cardS.classList.remove("spinning");
          btn.disabled = false;
          spinning = false;
        }
      }, 80);
    }
  </script>
</body>
</html>
